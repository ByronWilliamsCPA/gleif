---
# CodeRabbit Configuration for GLEIF Golden Copy CLI
# https://docs.coderabbit.ai/reference/configuration

language: en-US

early_access: true

reviews:
  profile: assertive

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - master
      - develop

  request_changes_workflow: true
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"

  auto_title_placeholder: "@coderabbitai title"
  auto_title_instructions: |
    Use conventional commits format: <type>(<scope>): <description>
    Types: feat, fix, docs, refactor, test, chore, perf, ci
    Keep descriptions concise and meaningful

  poem: true
  review_status: true
  collapse_walkthrough: false
  sequence_diagrams: true
  changed_files_summary: true
  estimate_code_review_effort: true
  related_issues: true
  related_prs: true
  assess_linked_issues: true

  suggested_labels: true
  auto_apply_labels: true
  labeling_instructions:
    - label: "python"
      instructions: "Apply when changes affect .py files"
    - label: "tests"
      instructions: "Apply when changes affect files in tests/"
    - label: "ci"
      instructions: "Apply when changes affect .github/workflows/ files"
    - label: "documentation"
      instructions: "Apply when changes affect README.md, docs/, or docstrings"
    - label: "security"
      instructions: "Apply when changes affect authentication, authorization, or security-related code"
    - label: "dependencies"
      instructions: "Apply when changes affect pyproject.toml or uv.lock"
    - label: "breaking-change"
      instructions: "Apply when changes break backwards compatibility"
    - label: "database"
      instructions: "Apply when changes affect DuckDB schema, queries, or data loading"

  path_filters:
    - "!**/*.lock"
    - "!**/.venv/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/__pycache__/**"
    - "!**/.pytest_cache/**"
    - "!**/.ruff_cache/**"
    - "!**/.coverage"

  path_instructions:
    - path: "src/gleif/**/*.py"
      instructions: |
        Review Python source code for:
        - Type hints on all function signatures
        - Proper error handling with specific exceptions
        - Docstrings for public functions and classes
        - No hardcoded secrets or credentials
        - Adherence to project coding standards (Ruff, BasedPyright)
        - SQL injection prevention in DuckDB queries (use parameterized queries)
        - Proper resource cleanup (DuckDB connections)

    - path: "src/gleif/db.py"
      instructions: |
        Review database code for:
        - SQL injection prevention
        - Proper connection lifecycle management
        - Efficient bulk loading patterns
        - Schema migration safety

    - path: "src/gleif/download.py"
      instructions: |
        Review download code for:
        - Proper HTTP error handling
        - Timeout configuration
        - Resource cleanup (temp files, connections)
        - Path traversal prevention in ZIP extraction

    - path: "tests/**/*.py"
      instructions: |
        Review test files for:
        - Comprehensive test coverage of edge cases
        - Clear test names describing behavior
        - Proper use of fixtures and mocking
        - No flaky tests or timing dependencies
        - Assertions that clearly explain failures

    - path: ".github/workflows/**"
      instructions: |
        Review GitHub Actions workflows for:
        - Security best practices (minimal permissions, pinned actions)
        - Proper secret handling
        - Efficient caching strategies
        - Clear job dependencies

    - path: "pyproject.toml"
      instructions: |
        Review dependency changes for:
        - Version constraint appropriateness
        - Security implications of new dependencies
        - License compatibility

  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true

  tools:
    ruff:
      enabled: true
    gitleaks:
      enabled: true
    markdownlint:
      enabled: true
    yamllint:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto

code_generation:
  docstrings:
    language: en-US

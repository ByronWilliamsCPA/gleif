# GLEIF Golden Copy CLI - CI Pipeline
#
# CI FOCUS: Code Quality & Testing
# This workflow handles code quality, formatting, type checking, and testing.
# Security scanning is consolidated in security-analysis.yml.
#
# QUALITY CHECKS:
#   - BasedPyright: Strict type checking
#   - Ruff: Code formatting validation and linting
#   - Pytest: Test suite with 80%+ coverage
#
# SECURITY SCANS (See security-analysis.yml):
#   - Bandit: Python static security analysis
#   - CodeQL: Advanced security analysis
#   - Dependency Review: PR-based vulnerability detection

name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop
      - 'feature/**'
  push:
    branches:
      - main
      - develop

permissions: read-all

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/reusable-python-test.yml
    permissions:
      contents: read
    with:
      python-version: '3.11'
      coverage-source: gleif

  quality-checks:
    uses: ./.github/workflows/reusable-python-quality.yml
    permissions:
      contents: read
    with:
      python-version: '3.11'
      source-dir: src
      build-docs: true

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [test, quality-checks]
    if: always()
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - name: Validate CI Results
        run: |
          if [[ "${{ needs.test.result }}" == "success" && \
                "${{ needs.quality-checks.result }}" == "success" ]]; then
            echo "CI Pipeline - All Checks Passed"
          else
            echo "CI Pipeline Failed"
            echo "test: ${{ needs.test.result }}"
            echo "quality-checks: ${{ needs.quality-checks.result }}"
            exit 1
          fi

# GLEIF Golden Copy CLI - Security Analysis
#
# Centralized security scanning, separate from CI for performance (~5-8 min savings per PR).
# CodeQL is handled by codeql.yml (advanced setup required by GitHub Code Security).
#
# SCANS:
#   - Dependency Review: PR-based dependency vulnerability detection
#   - Bandit: Python static security analysis
#   - OSV Scanner: Vulnerability detection (matches OpenSSF Scorecard)

name: Security Analysis

on:
  pull_request:
    branches:
      - main
      - develop
      - 'feature/**'
  schedule:
    - cron: '30 2 * * 1'  # Weekly Monday 2:30 AM UTC
  workflow_dispatch:

permissions: read-all

jobs:
  security:
    uses: ./.github/workflows/reusable-security-analysis.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      python-version: '3.11'

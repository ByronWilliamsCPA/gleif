# GLEIF Golden Copy CLI - CodeQL Advanced Security Analysis
#
# Scans Python source and GitHub Actions workflows for security vulnerabilities.
# Python: security-extended and security-and-quality query suites.
# Actions: security-extended query suite (workflow injection, secret exposure).

name: "CodeQL Advanced"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '19 5 * * 4'  # Weekly Thursday 5:19 AM UTC
  workflow_dispatch:

permissions: read-all

jobs:
  codeql:
    uses: ./.github/workflows/reusable-codeql.yml
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    with:
      python-version: '3.11'
      python-queries: 'security-extended,security-and-quality'
      actions-queries: 'security-extended'

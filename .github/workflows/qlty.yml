# Upload test coverage to Qlty Cloud
# Triggered after successful CI workflow completion

name: Qlty

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions: read-all

concurrency:
  group: qlty-coverage-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  qlty:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/reusable-qlty-coverage.yml
    permissions:
      contents: read
      actions: read
    secrets:
      QLTY_COVERAGE_TOKEN: ${{ secrets.QLTY_COVERAGE_TOKEN }}

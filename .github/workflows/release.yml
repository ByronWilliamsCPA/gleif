# GLEIF Golden Copy CLI - Release Pipeline
#
# Triggered on semver version tags (e.g. v1.2.3).
#
# STEPS:
#   1. Build wheel + sdist with uv
#   2. Sign both artifacts with Sigstore (keyless, OIDC-backed)
#   3. Generate SPDX SBOM for the source tree
#   4. Create GitHub release and attach all artifacts

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions: read-all

jobs:
  release:
    uses: ./.github/workflows/reusable-python-release.yml
    permissions:
      contents: write
      id-token: write
    with:
      python-version: '3.11'
      sbom-artifact-name: gleif-sbom.spdx.json

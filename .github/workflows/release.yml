# GLEIF Golden Copy CLI - Release Pipeline
#
# Triggered on semver version tags (e.g. v1.2.3).
#
# STEPS:
#   1. Build wheel + sdist with uv
#   2. Sign both artifacts with Sigstore (keyless, OIDC-backed)
#   3. Generate SPDX SBOM for the source tree
#   4. Create GitHub release and attach all artifacts

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions: read-all

env:
  PYTHON_VERSION: '3.11'

jobs:
  release:
    name: Build, Sign & Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # create GitHub release and upload assets
      id-token: write   # sigstore keyless OIDC signing

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5.5.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build distribution
        run: uv build

      - name: Sign with Sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: >-
            dist/*.whl
            dist/*.tar.gz

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          artifact-name: gleif-sbom.spdx.json
          output-file: dist/gleif-sbom.spdx.json
          format: spdx-json

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.sigstore
            dist/gleif-sbom.spdx.json

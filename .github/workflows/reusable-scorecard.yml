name: Reusable - OSSF Scorecard Analysis

on:
  workflow_call:
    secrets:
      SCORECARD_TOKEN:
        required: false
        description: >
          Fine-grained PAT with Administration:Read-only and Metadata:Read-only.
          Required for the Branch-Protection check to read classic branch
          protection rules via the GitHub API. Falls back to GITHUB_TOKEN
          (Branch-Protection scores 0) if not provided.

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Warn if SCORECARD_TOKEN is absent
        if: ${{ secrets.SCORECARD_TOKEN == '' }}
        run: |
          echo "::warning::SCORECARD_TOKEN not set; Branch-Protection falls back to GITHUB_TOKEN and may score 0"

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false
          repo_token: ${{ secrets.SCORECARD_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

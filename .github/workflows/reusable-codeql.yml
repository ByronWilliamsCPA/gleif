name: Reusable - CodeQL Advanced Security Analysis

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version for dependency installation'
        type: string
        default: '3.11'
      python-queries:
        description: 'CodeQL query suites for Python analysis'
        type: string
        default: 'security-extended,security-and-quality'
      actions-queries:
        description: 'CodeQL query suites for Actions analysis'
        type: string
        default: 'security-extended'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            queries: ${{ inputs.python-queries }}
          - language: actions
            queries: ${{ inputs.actions-queries }}

    steps:
      - name: Harden the runner (Audit outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        if: matrix.language == 'python'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install UV
        if: matrix.language == 'python'
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        if: matrix.language == 'python'
        run: uv sync --no-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          queries: ${{ matrix.queries }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: "/language:${{ matrix.language }}"

# MkDocs configuration for GLEIF CLI documentation
# Build:      uv run mkdocs build
# Serve:      uv run mkdocs serve
# Deploy:     uv run mkdocs gh-deploy

site_name: GLEIF CLI
site_description: >-
  CLI tool for downloading GLEIF golden copy datasets, loading them into
  DuckDB, and querying LEI relationship hierarchies.

docs_dir: docs
site_url: https://byronwilliamscpa.github.io/gleif/
repo_url: https://github.com/ByronWilliamsCPA/gleif
repo_name: ByronWilliamsCPA/gleif
copyright: "© 2026 GLEIF CLI"
site_author: Byron Williams

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - CLI Reference: cli-reference.md
  - Architecture:
      - Overview: architecture/index.md
      - Data Model & Schema: architecture/data-model.md
  - Development: development.md

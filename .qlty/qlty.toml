config_version = "0"

[smells]
mode = "comment"

exclude_patterns = [
  # Build artifacts and dependencies
  "*_min.*",
  "*-min.*",
  "*.min.*",
  "build/",
  "dist/",
  "node_modules/",
  "vendor/",
  ".venv/",
  "*.egg-info/",

  # Cache directories
  "cache/",
  ".mypy_cache/",
  ".ruff_cache/",
  ".pytest_cache/",
  "__pycache__/",

  # Claude and temp directories
  "**/.claude/**",
  "tmp_cleanup/",

  # Generated files
  "*.lock",
  "htmlcov/",
  ".coverage",
]

test_patterns = [
  "**/test/**",
  "**/tests/**",
  "**/spec/**",
  "**/*.test.*",
  "**/*.spec.*",
  "**/*_test.*",
  "**/*_spec.*",
  "**/test_*.*",
  "**/spec_*.*",
]

# ---------------------------------------------------------------------------
# Plugin source registry
# ---------------------------------------------------------------------------

[[source]]
name = "default"
default = true

# ---------------------------------------------------------------------------
# Plugin configuration
# ---------------------------------------------------------------------------

# GitHub Actions linting
[[plugin]]
name = "actionlint"

# Python security scanning
[[plugin]]
name = "bandit"

# Dependency vulnerability scanning
[[plugin]]
name = "osv-scanner"

# Python quality (SonarQube rules)
[[plugin]]
name = "radarlint-python"
mode = "comment"

# Text pattern detection (TODO/NOTE)
[[plugin]]
name = "ripgrep"
mode = "comment"

# Python formatting & linting
[[plugin]]
name = "ruff"
drivers = ["lint"]

# Secrets detection
[[plugin]]
name = "trufflehog"

# SAST scanning with custom rules
[[plugin]]
name = "semgrep"

# Markdown documentation linting
[[plugin]]
name = "markdownlint"

# YAML configuration linting
[[plugin]]
name = "yamllint"

# ---------------------------------------------------------------------------
# Per-plugin exclusions
# ---------------------------------------------------------------------------

# bandit and semgrep should not scan test files
[[exclude]]
plugins = ["bandit", "semgrep"]
file_patterns = ["tests/**", "**/test_*.py", "**/*_test.py"]

# ---------------------------------------------------------------------------
# Triage rules (suppress known false positives)
# ---------------------------------------------------------------------------

# Standard pytest assertions
[[triage]]
rule = "bandit:B101"
level = "ignore"

# TODO/NOTE comments are informational
[[triage]]
rule = "ripgrep:TODO"
level = "ignore"

[[triage]]
rule = "ripgrep:NOTE"
level = "ignore"

[[triage]]
rule = "radarlint-python:S1135"
level = "ignore"

# f-string SQL in db.py uses read_csv() file paths, not user input
[[triage]]
rule = "semgrep:sql-injection-format-string"
level = "ignore"
path = "src/gleif/db.py"

[[triage]]
rule = "bandit:B608"
level = "ignore"
path = "src/gleif/db.py"

# f-string SQL in queries.py interpolates only _ENTITY_COLS (a module constant)
# All user-supplied values use $1/$2 DuckDB parameterized placeholders
[[triage]]
rule = "semgrep:sql-injection-format-string"
level = "ignore"
path = "src/gleif/queries.py"

[[triage]]
rule = "bandit:B608"
level = "ignore"
path = "src/gleif/queries.py"

# MkDocs admonitions require 4-space-indented fenced code blocks; markdownlint
# treats these as "indented style" mixed with fenced, producing false positives
[[triage]]
rule = "markdownlint:MD046"
level = "ignore"
path = "docs/**"
